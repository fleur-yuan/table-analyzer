<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>表格统计分析器</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f7fa; color: #333; min-height: 100vh; }
  .container { max-width: 980px; margin: 0 auto; padding: 28px 16px; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .subtitle { color: #888; font-size: 14px; margin-bottom: 24px; }

  .card { background: #fff; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 1px 6px rgba(0,0,0,.07); }
  .step-label { font-size: 11px; font-weight: 700; color: #aaa; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
  .card h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }

  /* Upload */
  .upload-zone { border: 2px dashed #d0d7de; border-radius: 10px; padding: 44px 20px; text-align: center; cursor: pointer; transition: all .2s; background: #fafbfc; }
  .upload-zone:hover, .upload-zone.drag-over { border-color: #4f8ef7; background: #eef4ff; }
  .upload-zone .icon { font-size: 42px; margin-bottom: 10px; }
  .upload-zone .hint { color: #666; font-size: 14px; }
  .upload-zone .hint strong { color: #4f8ef7; }
  #file-input { display: none; }
  .file-loaded { margin-top: 10px; font-size: 13px; color: #52c41a; font-weight: 500; }

  /* Config row */
  .cfg-row { display: flex; align-items: flex-end; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
  .cfg-item { display: flex; flex-direction: column; gap: 4px; }
  .cfg-item label { font-size: 12px; color: #666; font-weight: 500; }
  .cfg-item input[type=number] { width: 80px; border: 1px solid #d0d7de; border-radius: 6px; padding: 6px 10px; font-size: 14px; outline: none; }
  .cfg-item input:focus { border-color: #4f8ef7; }

  /* Buttons */
  .btn { padding: 8px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all .15s; }
  .btn-primary { background: #4f8ef7; color: #fff; }
  .btn-primary:hover { background: #3a7ef6; }
  .btn-secondary { background: #f0f0f0; color: #555; }
  .btn-secondary:hover { background: #e0e0e0; }
  .btn-sm { padding: 5px 12px; font-size: 13px; border-radius: 6px; }

  /* Preview table */
  .preview-wrap { overflow-x: auto; margin-top: 14px; border-radius: 8px; border: 1px solid #eee; }
  .preview-wrap table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .preview-wrap th { background: #f5f7fa; padding: 6px 10px; border-bottom: 1px solid #eee; white-space: nowrap; font-weight: 600; color: #555; }
  .preview-wrap td { padding: 5px 10px; border-bottom: 1px solid #f0f0f0; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #555; font-size: 12px; }
  .preview-wrap tr:last-child td { border-bottom: none; }

  /* Dimension editor */
  .dim-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; margin-top: 14px; }
  .dim-card { border: 1.5px solid #e0e6ff; border-radius: 10px; padding: 12px 14px; background: #f8f9ff; }
  .dim-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .dim-name-input { flex: 1; border: 1px solid #d0d7de; border-radius: 6px; padding: 5px 10px; font-size: 13px; font-weight: 600; outline: none; }
  .dim-name-input:focus { border-color: #4f8ef7; }
  .btn-del-dim { background: none; border: none; color: #ccc; cursor: pointer; font-size: 18px; line-height: 1; padding: 0 2px; }
  .btn-del-dim:hover { color: #f00; }
  .col-chips { display: flex; flex-wrap: wrap; gap: 5px; }
  .col-chip { padding: 3px 9px; border-radius: 14px; font-size: 11px; border: 1.5px solid #c5d0fa; background: #fff; cursor: pointer; color: #4f8ef7; user-select: none; transition: all .12s; }
  .col-chip:hover { background: #e8edff; }
  .col-chip.on { background: #4f8ef7; border-color: #4f8ef7; color: #fff; }
  .col-chip.off { border-color: #ddd; color: #aaa; background: #fff; }
  .col-chip.off:hover { border-color: #bbb; color: #888; }

  .dim-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }

  /* Result */
  .result-meta { font-size: 13px; color: #888; margin-bottom: 14px; }
  table.result-tbl { width: 100%; border-collapse: collapse; font-size: 14px; }
  table.result-tbl th { background: #f0f4ff; padding: 10px 14px; text-align: left; font-weight: 600; border-bottom: 2px solid #d8e2ff; }
  table.result-tbl td { padding: 9px 14px; border-bottom: 1px solid #f0f0f0; }
  table.result-tbl tr:last-child td { border-bottom: none; }
  table.result-tbl tr:hover td { background: #f8f9fb; }

  .bar-wrap { display: flex; align-items: center; gap: 8px; }
  .bar { height: 8px; border-radius: 4px; background: #4f8ef7; }
  .pct { font-size: 12px; color: #666; white-space: nowrap; }
  .rank-badge { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 50%; font-size: 11px; font-weight: 700; }
  .r1 { background: #ffd700; color: #7a5800; }
  .r2 { background: #c8c8c8; color: #444; }
  .r3 { background: #cd7f32; color: #fff; }
  .r0 { background: #eee; color: #888; }

  .result-actions { display: flex; gap: 8px; margin-bottom: 14px; }

  .info-box { background: #fffbe6; border: 1px solid #ffe58f; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #7a5f00; margin-bottom: 14px; }
  .success-box { background: #f6ffed; border: 1px solid #b7eb8f; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #3a7d0a; margin-bottom: 14px; }

  .hidden { display: none; }
  .divider { height: 1px; background: #f0f0f0; margin: 16px 0; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #222; color: #fff; padding: 8px 22px; border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 9999; }
  .toast.show { opacity: 1; }

  .section-title { font-size: 13px; font-weight: 600; color: #555; margin-bottom: 8px; }
  .all-cols-pool { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px; background: #f8f8f8; border-radius: 8px; border: 1px solid #eee; min-height: 40px; }
  .pool-chip { padding: 4px 10px; border-radius: 14px; font-size: 12px; border: 1.5px solid #d0d7de; background: #fff; cursor: pointer; color: #555; transition: all .12s; }
  .pool-chip:hover { border-color: #4f8ef7; color: #4f8ef7; }
  .pool-chip.used { opacity: .35; cursor: default; text-decoration: line-through; }
</style>
</head>
<body>
<div class="container">
  <h1>表格统计分析器</h1>
  <p class="subtitle">上传 Excel，自动识别合并表头结构，统计各维度考频与占比</p>

  <!-- Step 1 -->
  <div class="card">
    <div class="step-label">Step 1</div>
    <h2>上传 Excel 文件</h2>
    <div class="upload-zone" id="upload-zone">
      <div class="icon">📊</div>
      <div class="hint">拖入 <strong>.xlsx / .xls</strong> 文件，或点击选择</div>
      <div class="file-loaded hidden" id="file-loaded">✓ 文件已加载</div>
    </div>
    <input type="file" id="file-input" accept=".xlsx,.xls">
  </div>

  <!-- Step 2 -->
  <div class="card hidden" id="step2-card">
    <div class="step-label">Step 2</div>
    <h2>确认表格结构</h2>

    <div class="cfg-row">
      <div class="cfg-item">
        <label>表头共几行？</label>
        <input type="number" id="header-rows" value="2" min="1" max="5">
      </div>
      <div class="cfg-item">
        <label>名称列（第几列）</label>
        <input type="number" id="name-col" value="1" min="1">
      </div>
      <button class="btn btn-secondary btn-sm" onclick="refreshPreview()">刷新预览</button>
    </div>

    <div class="section-title">数据预览（前5行）</div>
    <div id="preview-wrap" class="preview-wrap"></div>

    <div class="divider"></div>
    <div id="parse-summary" class="success-box hidden"></div>

    <button class="btn btn-primary" onclick="goStep3()" style="margin-top:4px;">下一步：配置统计维度</button>
  </div>

  <!-- Step 3 -->
  <div class="card hidden" id="step3-card">
    <div class="step-label">Step 3</div>
    <h2>配置统计维度</h2>

    <div class="info-box" id="auto-detect-info"></div>

    <div class="section-title">未分配的列（点击分配到某个维度）</div>
    <div class="all-cols-pool" id="cols-pool"></div>

    <div class="divider"></div>
    <div class="section-title">统计维度（可修改名称、增删列）</div>
    <div class="dim-grid" id="dim-grid"></div>

    <div class="dim-actions">
      <button class="btn btn-secondary btn-sm" onclick="addDim()">＋ 新增维度</button>
      <button class="btn btn-secondary btn-sm" onclick="autoGroup()">⚡ 重新自动识别</button>
    </div>

    <div class="divider"></div>
    <button class="btn btn-primary" onclick="analyze()">生成统计结果</button>
  </div>

  <!-- Step 4 -->
  <div class="card hidden" id="step4-card">
    <div class="step-label">统计结果</div>
    <h2 id="result-title"></h2>
    <div class="result-actions">
      <button class="btn btn-secondary btn-sm" onclick="copyResult()">复制表格</button>
      <button class="btn btn-secondary btn-sm" onclick="document.getElementById('step3-card').scrollIntoView({behavior:'smooth'})">返回修改</button>
    </div>
    <div id="result-wrap"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── State ───────────────────────────────────────────────
let rawSheet = null;       // XLSX sheet object
let sheetData = [];        // array of row arrays (raw, no fill)
let merges = [];           // [{s:{r,c}, e:{r,c}}]
let dims = [];             // [{name, cols:[colIndex,...]}]
let totalRows = 0;

// ─── Upload ──────────────────────────────────────────────
const uz = document.getElementById('upload-zone');
const fi = document.getElementById('file-input');
uz.onclick = () => fi.click();
uz.ondragover = e => { e.preventDefault(); uz.classList.add('drag-over'); };
uz.ondragleave = () => uz.classList.remove('drag-over');
uz.ondrop = e => { e.preventDefault(); uz.classList.remove('drag-over'); if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); };
fi.onchange = e => { if (e.target.files[0]) loadFile(e.target.files[0]); };

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = function(ev) {
    const wb = XLSX.read(ev.target.result, { type: 'array', cellDates: false });
    rawSheet = wb.Sheets[wb.SheetNames[0]];
    // Get raw data WITHOUT filling merged cells (defval null, no fill)
    sheetData = XLSX.utils.sheet_to_json(rawSheet, { header: 1, defval: null, raw: true });
    // Get merge info
    merges = rawSheet['!merges'] || [];
    document.getElementById('file-loaded').textContent = '✓ 已加载：' + file.name;
    document.getElementById('file-loaded').classList.remove('hidden');
    document.getElementById('step2-card').classList.remove('hidden');
    refreshPreview();
  };
  reader.readAsArrayBuffer(file);
}

// ─── Step 2: Preview ─────────────────────────────────────
function getHeaderRows() { return parseInt(document.getElementById('header-rows').value) || 2; }
function getNameCol() { return parseInt(document.getElementById('name-col').value) - 1; }

function refreshPreview() {
  const hRows = getHeaderRows();
  const nameCol = getNameCol();
  const dataRows = sheetData.slice(hRows).filter(r => r && getCellValue(r, nameCol) !== null);
  totalRows = dataRows.length;

  // Build preview table (header + first 5 data rows)
  const numCols = Math.max(...sheetData.slice(0, hRows).map(r => (r||[]).length));
  // Compute effective headers using merged cells
  const headers = getEffectiveHeaders();

  let html = '<table><thead>';
  // Show raw header rows
  for (let hr = 0; hr < hRows; hr++) {
    html += '<tr>';
    for (let c = 0; c < numCols; c++) {
      const v = (sheetData[hr]||[])[c];
      // Check if this cell is top-left of a merge
      const mspan = getMergeSpan(hr, c);
      if (mspan === null) continue; // skip merged cells that aren't top-left
      html += `<th colspan="${mspan.colspan}" rowspan="${mspan.rowspan}">${v !== null && v !== undefined ? esc(String(v)) : ''}</th>`;
    }
    html += '</tr>';
  }
  html += '</thead><tbody>';
  dataRows.slice(0, 5).forEach(row => {
    html += '<tr>';
    for (let c = 0; c < numCols; c++) {
      const v = getCellValue(row, c);
      html += `<td title="${v !== null ? esc(String(v)) : ''}">${v !== null && v !== undefined ? esc(String(v).substring(0,30)) : ''}</td>`;
    }
    html += '</tr>';
  });
  html += '</tbody></table>';
  document.getElementById('preview-wrap').innerHTML = html;

  const sumEl = document.getElementById('parse-summary');
  sumEl.textContent = `识别到 ${totalRows} 行数据，${numCols} 列`;
  sumEl.classList.remove('hidden');
}

// ─── Merge helpers ───────────────────────────────────────
// Returns {colspan, rowspan} if cell (r,c) is the top-left of a merge, else returns {colspan:1,rowspan:1}
// Returns null if cell is inside a merge (not top-left)
function getMergeSpan(r, c) {
  for (const m of merges) {
    if (m.s.r === r && m.s.c === c) return { colspan: m.e.c - m.s.c + 1, rowspan: m.e.r - m.s.r + 1 };
    if (r >= m.s.r && r <= m.e.r && c >= m.s.c && c <= m.e.c) return null; // inside merge, not top-left
  }
  return { colspan: 1, rowspan: 1 };
}

// For a given column index, return the "effective" header label:
// walk upward through header rows and find the merge group label that covers this column
function getEffectiveHeaders() {
  const hRows = getHeaderRows();
  const numCols = Math.max(...sheetData.slice(0, hRows + 1).map(r => (r||[]).length), 0);
  const labels = [];
  for (let c = 0; c < numCols; c++) {
    // First try: exact cell value in the last header row
    let label = null;
    for (let r = hRows - 1; r >= 0; r--) {
      const v = (sheetData[r]||[])[c];
      if (v !== null && v !== undefined && String(v).trim() !== '') {
        label = String(v).trim();
        break;
      }
    }
    // If still null, find a merge that covers this column in any header row
    if (label === null) {
      outer: for (const m of merges) {
        if (m.e.r < hRows && c >= m.s.c && c <= m.e.c) {
          const v = (sheetData[m.s.r]||[])[m.s.c];
          if (v !== null && v !== undefined) { label = String(v).trim(); break outer; }
        }
      }
    }
    labels.push(label || ('列' + (c + 1)));
  }
  return labels;
}

// Get top-level group label for a column (from first header row, following merges)
function getTopLevelLabel(colIdx) {
  const hRows = getHeaderRows();
  // Check row 0 first
  const v0 = (sheetData[0]||[])[colIdx];
  if (v0 !== null && v0 !== undefined && String(v0).trim() !== '') return String(v0).trim();
  // Find merge that covers (row=0, col=colIdx)
  for (const m of merges) {
    if (m.s.r === 0 && colIdx >= m.s.c && colIdx <= m.e.c) {
      const mv = (sheetData[0]||[])[m.s.c];
      if (mv !== null && mv !== undefined) return String(mv).trim();
    }
  }
  return null;
}

function getCellValue(row, c) {
  if (!row) return null;
  const v = row[c];
  if (v === null || v === undefined) return null;
  if (String(v).trim() === '') return null;
  return v;
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ─── Step 3: Auto-group ──────────────────────────────────
function goStep3() {
  autoGroup();
  document.getElementById('step3-card').classList.remove('hidden');
  document.getElementById('step3-card').scrollIntoView({ behavior: 'smooth' });
}

function autoGroup() {
  const hRows = getHeaderRows();
  const nameCol = getNameCol();
  const numCols = Math.max(...sheetData.slice(0, hRows + 1).map(r => (r||[]).length), 0);
  const subHeaders = getEffectiveHeaders();

  // Strategy: group by top-level label (row 0, respecting merges)
  const groupMap = {}; // label -> [colIndices]
  const ungrouped = [];

  for (let c = 0; c < numCols; c++) {
    if (c === nameCol) continue;
    const topLabel = getTopLevelLabel(c);
    if (topLabel) {
      if (!groupMap[topLabel]) groupMap[topLabel] = [];
      groupMap[topLabel].push(c);
    } else {
      ungrouped.push(c);
    }
  }

  // If no top-level grouping found, fall back to individual columns
  dims = [];
  if (Object.keys(groupMap).length > 0) {
    for (const [label, cols] of Object.entries(groupMap)) {
      dims.push({ name: label, cols: [...cols] });
    }
    // Ungrouped columns each become their own dim
    ungrouped.forEach(c => dims.push({ name: subHeaders[c], cols: [c] }));
    document.getElementById('auto-detect-info').innerHTML =
      `⚡ 自动识别到 <strong>${dims.length} 个维度</strong>（根据合并表头分组）。可在下方调整名称或列的归属。`;
  } else {
    // No merges found, treat each column as its own dimension
    for (let c = 0; c < numCols; c++) {
      if (c === nameCol) continue;
      dims.push({ name: subHeaders[c], cols: [c] });
    }
    document.getElementById('auto-detect-info').innerHTML =
      `未检测到合并表头，已将每列作为独立维度。可手动调整。`;
  }

  renderDims();
}

function renderDims() {
  const subHeaders = getEffectiveHeaders();
  const nameCol = getNameCol();
  const numCols = Math.max(...sheetData.slice(0, getHeaderRows() + 1).map(r => (r||[]).length), 0);

  // Compute which cols are assigned
  const assigned = new Set(dims.flatMap(d => d.cols));

  // Render pool
  const pool = document.getElementById('cols-pool');
  pool.innerHTML = '';
  for (let c = 0; c < numCols; c++) {
    if (c === nameCol) continue;
    const chip = document.createElement('span');
    chip.className = 'pool-chip' + (assigned.has(c) ? ' used' : '');
    chip.textContent = subHeaders[c];
    chip.dataset.col = c;
    if (!assigned.has(c)) {
      chip.onclick = () => assignToLastDim(c);
    }
    pool.appendChild(chip);
  }

  // Render dims
  const grid = document.getElementById('dim-grid');
  grid.innerHTML = '';
  dims.forEach((d, di) => {
    const card = document.createElement('div');
    card.className = 'dim-card';

    const header = document.createElement('div');
    header.className = 'dim-card-header';
    const inp = document.createElement('input');
    inp.className = 'dim-name-input';
    inp.value = d.name;
    inp.oninput = e => { dims[di].name = e.target.value; };
    const del = document.createElement('button');
    del.className = 'btn-del-dim';
    del.textContent = '×';
    del.onclick = () => { dims.splice(di, 1); renderDims(); };
    header.appendChild(inp);
    header.appendChild(del);
    card.appendChild(header);

    const chips = document.createElement('div');
    chips.className = 'col-chips';
    // Show all non-name cols as chips, highlight the ones in this dim
    for (let c = 0; c < numCols; c++) {
      if (c === nameCol) continue;
      const chip = document.createElement('span');
      const isOn = d.cols.includes(c);
      chip.className = 'col-chip ' + (isOn ? 'on' : 'off');
      chip.textContent = subHeaders[c];
      chip.onclick = () => {
        if (d.cols.includes(c)) {
          dims[di].cols = dims[di].cols.filter(x => x !== c);
        } else {
          // Remove from other dims
          dims.forEach((od, oi) => { if (oi !== di) dims[oi].cols = od.cols.filter(x => x !== c); });
          dims[di].cols.push(c);
        }
        renderDims();
      };
      chips.appendChild(chip);
    }
    card.appendChild(chips);
    grid.appendChild(card);
  });
}

function assignToLastDim(c) {
  if (dims.length === 0) addDim();
  const last = dims[dims.length - 1];
  if (!last.cols.includes(c)) {
    dims.forEach(d => { d.cols = d.cols.filter(x => x !== c); });
    last.cols.push(c);
    renderDims();
  }
}

function addDim() {
  dims.push({ name: '新维度', cols: [] });
  renderDims();
}

// ─── Step 4: Analyze ─────────────────────────────────────
function analyze() {
  const hRows = getHeaderRows();
  const nameCol = getNameCol();
  const subHeaders = getEffectiveHeaders();

  const dataRows = sheetData.slice(hRows).filter(r => r && getCellValue(r, nameCol) !== null);
  const total = dataRows.length;

  if (total === 0) { showToast('未找到数据行，请检查"表头共几行"设置'); return; }
  if (dims.length === 0) { showToast('请至少添加一个统计维度'); return; }

  // Build results: each dim gets a count + sub-col counts
  const results = dims
    .filter(d => d.cols.length > 0)
    .map(d => {
      const count = dataRows.filter(row => d.cols.some(c => getCellValue(row, c) !== null)).length;
      // Sub-column counts (only show if dim has >1 col)
      const subs = d.cols.length > 1
        ? d.cols.map(c => ({
            name: subHeaders[c] || ('列' + (c + 1)),
            count: dataRows.filter(row => getCellValue(row, c) !== null).length
          }))
        : [];
      return { name: d.name, count, subs };
    })
    .sort((a, b) => b.count - a.count);

  document.getElementById('result-title').textContent = `共 ${total} 份试卷，各维度考频统计`;

  const maxCount = results[0]?.count || 1;
  let html = `<table class="result-tbl" id="rtbl"><thead><tr>
    <th>排名</th><th>维度</th><th>考查套数</th><th>考频</th><th>可视化</th>
  </tr></thead><tbody>`;

  results.forEach((r, i) => {
    const pct = (r.count / total * 100).toFixed(1);
    const bw = Math.round(r.count / maxCount * 150);
    const rc = i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : 'r0';
    // Main row
    html += `<tr style="background:#fff;">
      <td><span class="rank-badge ${rc}">${i + 1}</span></td>
      <td><strong>${esc(r.name)}</strong></td>
      <td>${r.count} / ${total}</td>
      <td>${pct}%</td>
      <td><div class="bar-wrap"><div class="bar" style="width:${bw}px"></div><span class="pct">${pct}%</span></div></td>
    </tr>`;
    // Sub rows
    r.subs.forEach(s => {
      const sp = (s.count / total * 100).toFixed(1);
      const sbw = Math.round(s.count / maxCount * 150);
      html += `<tr style="background:#f9faff;">
        <td></td>
        <td style="padding-left:28px;color:#666;font-size:13px;">└ ${esc(s.name)}</td>
        <td style="color:#666;font-size:13px;">${s.count} / ${total}</td>
        <td style="color:#666;font-size:13px;">${sp}%</td>
        <td><div class="bar-wrap"><div class="bar" style="width:${sbw}px;background:#a0bffa;height:6px;"></div><span class="pct">${sp}%</span></div></td>
      </tr>`;
    });
  });
  html += '</tbody></table>';

  document.getElementById('result-wrap').innerHTML = html;
  document.getElementById('step4-card').classList.remove('hidden');
  document.getElementById('step4-card').scrollIntoView({ behavior: 'smooth' });
}

function copyResult() {
  const tbl = document.getElementById('rtbl');
  if (!tbl) return;
  let txt = '排名\t维度\t考查套数\t考频\n';
  for (const row of tbl.rows) {
    if (row.rowIndex === 0) continue; // skip thead
    const cells = Array.from(row.cells).slice(0, 4).map(c => c.textContent.trim().replace(/\s+/g,' '));
    txt += cells.join('\t') + '\n';
  }
  navigator.clipboard.writeText(txt).then(() => showToast('已复制，可直接粘贴到 Excel'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
